<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Vòng quay may mắn</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #111;
  color: #fff;
}

.container {
  position: relative;
  width: 300px;
  margin: 50px auto;
}

#wheel {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 8px solid #fff;
  background: conic-gradient(
    #e74c3c 0deg 60deg,
    #f39c12 60deg 120deg,
    #2ecc71 120deg 180deg,
    #3498db 180deg 240deg,
    #9b59b6 240deg 300deg,
    #f1c40f 300deg 360deg
  );
  transition: transform 4s ease-out;
}

#arrow {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
}

button {
  padding: 12px 30px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🎯 Vòng quay may mắn</h2>

<div class="container">
  <div id="arrow">⬇️</div>
  <div id="wheel"></div>
</div>

<button onclick="spin()">QUAY NGAY</button>

<script>
const rewards = [88,188,288,388,588,888];
let currentDeg = 0;
let spinning = false;

function spin() {
  if(spinning) return;
  spinning = true;

  let index = Math.floor(Math.random() * rewards.length);
  let result = rewards[index];

  let rotate = 360 * 5 + (360 - index * 60 - 30);
  currentDeg += rotate;

  const wheel = document.getElementById("wheel");
  wheel.style.transform = rotate(${currentDeg}deg);

  setTimeout(() => {
    spinning = false;

    if(confirm("🎉 Chúc mừng! Bạn nhận ưu đãi " + result + "k\nNhấn OK để nhận")) {
      window.location.href = "https://linkcuaban.com";
    }

  }, 4200);
}
</script>

</body>
</html>
